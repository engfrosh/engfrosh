        <style>
            
            /*link*/
            a.discord:link{
                color:#7289da; 
                font-size:16px;
                text-decoration:none;
            }

            a.discord:visited{
                color:#7289da; 
                font-size:16px;
                text-decoration:none;
            }

            a.discord:hover{
                color:#7289da;
                font-size:16px;
                text-decoration:underline;
            }

            /*body and div*/
            body.discord{
                background-color:#353940;
            }

            div.discord{
                text-align:center;
                margin:0;
                position:absolute;
                top:50%;
                left:50%;
                -ms-transform:translate(-50%,-50%);
                transform:translate(-50%,-50%);
            }

            /*image*/
            img.discord{
                height:76px;
            }

            /*paragraph*/
            p.discord{
                color:#aaaaaa;
            }

        </style>
