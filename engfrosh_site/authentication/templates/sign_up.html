<!DOCTYPE html>
<html>

<head>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'engfrosh.css' %}">
    <title>Sign Up</title>
    <style>
        .login_button {
            font-family: "Ginto Nord", "Whitney", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
            text-align: center;
            text-decoration: none;
            color: white;
            padding: 10pt;
            border-radius: 6pt;
            margin: 5px;
            display: block;
        }

        .discord.login_button {
            background-color: #5865F2;
            font-size: large;
        }

        .admin.login_button {
            background-color: slategray;
            font-size: small;
            
        }

        .login_box {
            margin: auto;
            margin-top: 20%;
            width: 50%;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login_box">
        <h1>Note: You MUST link your Discord on the next screen or you will be unable to log back in</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Sign Up">
        </form>
    </div>
</body>

</html>
